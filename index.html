<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title> motivo da minha felicidade ❤️</title>

  <style>
    body{
      background: linear-gradient(to right, #ff758c, #ff7eb3);
      font-family: Arial;
      color: white;
      text-align: center;
      padding-top: 100px;
    }

    .card{
      background: rgba(255,255,255,0.15);
      padding: 40px;
      width: 400px;
      margin: auto;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    h1{
      font-size: 40px;
    }

    p{
      font-size: 20px;
    }

    button{
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      background: white;
      color: #ff4f81;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover{
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>❤️ Para Você gigika ❤️</h1>
<audio controls>
  <source src="musica.mp3" type="audio/mpeg">
</audio>
<img src="foto.jpg" width="250">
    <p>
      Você é uma pessoa linda por dentro e fora, e eu estou morrendo de saudades da sua voz.
    </p>

    <p>
      Você merece o mundo, Você é um pessoa que me faz feliz.
    </p>

    <button>eu gosto de ti ❤️</button>
  </div>

</body>
</html>
